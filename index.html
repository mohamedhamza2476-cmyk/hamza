<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltDown | Smart Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: var(--light); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navbar */
        .navbar { padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 26px; font-weight: 700; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Main Section */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 650px; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); text-align: center; }

        input { width: 100%; padding: 18px; background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }

        .btn-download { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.4s; }
        .btn-download:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Stats Section */
        .stats-container { display: flex; justify-content: space-around; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 20px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 12px; color: #64748b; }

        /* Result Area */
        #resultZone { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .video-preview { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        .quality-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 12px 20px; margin-bottom: 10px; border-radius: 10px; text-decoration: none; color: #fff; border: 1px solid transparent; transition: 0.2s; }
        .quality-card:hover { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .badge { background: var(--primary); padding: 2px 8px; border-radius: 5px; font-size: 11px; }

        /* Loader */
        #loading { display: none; margin: 20px 0; color: var(--primary); }

        /* Footer */
        footer { padding: 40px; text-align: center; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.05); }
        footer p { margin: 5px 0; font-size: 14px; color: #94a3b8; }
        footer strong { color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">⚡ VOLT-DOWN</div>
        <div style="font-size: 12px; color: #94a3b8;"><i class="fas fa-shield-alt"></i> آمن وسريع</div>
    </nav>

    <div class="main-content">
        <div class="glass-card">
            <h1 style="margin-top:0;">حمل فيديوهاتك المفضلة</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">يدعم يوتيوب، تيك توك، فيسبوك، وإنستجرام</p>

            <input type="text" id="vUrl" placeholder="أدخل رابط الفيديو هنا...">
            <button class="btn-download" onclick="fetchVideo()">تنزيل الفيديو<i class="fas fa-arrow-left"></i></button>

            <div id="loading">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>جاري تحليل الرابط وتجهيز الملف...</p>
            </div>

            <div id="resultZone">
                <h3 id="vTitle" style="font-size: 16px; margin-bottom: 15px;"></h3>
                <img id="vThumb" class="video-preview">
                <div id="linksList"></div>
            </div>

            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-value">+15,400</span>
                    <span class="stat-label">تحميل ناجح</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">99.9%</span>
                    <span class="stat-label">وقت التشغيل</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">1GB/s</span>
                    <span class="stat-label">سرعة السيرفر</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 <strong>VoltDown</strong> - جميع الحقوق محفوظة</p>
        <p>تم التطوير بواسطة <strong>MOHAMED HAMZA</strong></p>
    </footer>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('vUrl').value;
            const loader = document.getElementById('loading');
            const result = document.getElementById('resultZone');
            
            if(!url) return alert("يرجى إدخال الرابط أولاً");

            loader.style.display = 'block';
            result.style.display = 'none';

            const fd = new FormData();
            fd.append('url', url);

            try {
                const response = await fetch('/analyze', { method: 'POST', body: fd });
                const data = await response.json();
                loader.style.display = 'none';

                if(data.formats) {
                    result.style.display = 'block';
                    document.getElementById('vTitle').innerText = data.title;
                    document.getElementById('vThumb').src = data.thumb;
                    
                    let html = '';
                    data.formats.forEach(f => {
                        // استخدام نظام الـ Proxy لتجنب Access Denied
                        const downloadUrl = `/proxy_download?url=${encodeURIComponent(f.url)}&filename=${encodeURIComponent(data.title)}.${f.ext}`;
                        html += `
                            <a href="${downloadUrl}" class="quality-card">
                                <span><i class="fas fa-download"></i> جودة ${f.quality}</span>
                                <span class="badge">${f.ext.toUpperCase()}</span>
                            </a>`;
                    });
                    document.getElementById('linksList').innerHTML = html;
                } else {
                    alert("نعتذر: " + data.error);
                }
            } catch(e) {
                loader.style.display = 'none';
                alert("حدث خطأ في الاتصال بالسيرفر");
            }
        }
    </script>
</body>
</html>
